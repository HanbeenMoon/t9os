# OLA Orient Routes — 분기 조건 + 확인 항목 정의
# pre-tool-orient.sh가 참조. 감시단 G3도 참조 가능.
#
# severity:
#   block  = exit 2 (차단, 확인 후 재시도)
#   pause  = 리마인더만 (로그)
#   silent = 로그만 (표시 안 함)

routes:

  BUILD:
    description: "새 코드 작성 (pipes/, lib/, t9_seed.py)"
    conditions:
      new_file_in_pipes:
        trigger: "Write && path matches T9OS/pipes/*.py"
        severity: block
        checklist:
          - "Search: t9_seed.py search로 유사 기능 검색"
          - "Reuse: lib/ 또는 기존 pipes/에서 재사용 가능한 코드?"
          - "Buy: pip/npm/외부 서비스로 해결 가능?"
          - "위 3개 모두 불가일 때만 Build"
        on_skip: "로그에 SRBB_SKIP 기록"
      edit_existing:
        trigger: "Edit && path matches T9OS/pipes/*.py|lib/*.py|t9_seed.py"
        severity: pause
        checklist:
          - "기존 코드 읽었는가?"
          - "테스트 후 동작 확인할 것"

  CONSTITUTION_CHANGE:
    description: "헌법/핵심문서 수정"
    conditions:
      l1_l2_direct:
        trigger: "Edit|Write && path matches T9OS/constitution/L1_*|L2_*"
        severity: block
        checklist:
          - "한빈 명시적 승인 텍스트 존재 확인"
          - "3곳 동시 갱신 목록: L1/L2 + CLAUDE.md + memory"
          - "숫자/상태 기술이 현재와 일치하는가?"
      bible_claude:
        trigger: "Edit|Write && path matches T9OS/BIBLE.md|CLAUDE.md"
        severity: pause
        checklist:
          - "정량 주장 검증 (find/wc -l로 실수 확인)"
          - "한빈 원문 인용 형식 준수 (> 블록인용)"

  INFRA_CHANGE:
    description: "훅/설정 변경"
    conditions:
      hooks:
        trigger: "Edit|Write && path matches .claude/hooks/*"
        severity: pause
        checklist:
          - "다른 세션에도 영향 미치는 변경인가?"
          - "세션 시작/종료 훅 타임아웃 고려"
      settings:
        trigger: "Edit|Write && path matches .claude/settings.json"
        severity: pause
        checklist:
          - "훅 체인 순서가 맞는가? (하드 게이트 → Orient → 나머지)"

  DEPLOY:
    description: "배포/가동 관련"
    conditions:
      systemd:
        trigger: "Bash && command matches systemctl"
        severity: pause
        checklist:
          - "변경 대상 현재 상태 확인 (is-active)"
          - "배포 후 smoke test 실행"
      git_push:
        trigger: "Bash && command matches git push"
        severity: pause
        checklist:
          - "smoke test 37/37 확인했는가?"
          - "민감정보 커밋에 포함 안 되었는가?"

  DATA_CHANGE:
    description: "DB/데이터 직접 조작"
    conditions:
      sql_like_metadata:
        trigger: "SQL query contains LIKE on metadata column"
        severity: pause
        checklist:
          - "정규 컬럼 사용 가능한가? (LIKE '%keyword%' 대신)"
          - "전수 검사 원칙: 결과 건수 확인"

# 감시단 연동
# G3(규칙감시단)의 G3_SearchReuseBuyBuild가 이 파일을 참조하여
# BUILD 조건 위반을 사후에도 감지할 수 있다.
guardian_integration:
  G3:
    reads: ["BUILD.conditions.new_file_in_pipes"]
    action: "SRBB 위반 시 에스컬레이션"
  G4:
    reads: ["CONSTITUTION_CHANGE.conditions.bible_claude"]
    action: "정량 주장 검증 자동 실행"
