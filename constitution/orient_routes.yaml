# OLA Orient Routes — branch conditions + checklists
# pre-tool-orient.sh references this file. G3 guardian may also reference.
#
# severity:
#   block  = exit 2 (blocked, retry after verification)
#   pause  = reminder only (logged)
#   silent = log only (not displayed)

routes:

  BUILD:
    description: "New code creation (pipes/, lib/, t9_seed.py)"
    conditions:
      new_file_in_pipes:
        trigger: "Write && path matches T9OS/pipes/*.py"
        severity: block
        checklist:
          - "Search: t9_seed.py search for similar functionality"
          - "Reuse: reusable code in lib/ or existing pipes/?"
          - "Buy: solvable via pip/npm/external service?"
          - "Build only when all three above are not viable"
        on_skip: "Log SRBB_SKIP"
      edit_existing:
        trigger: "Edit && path matches T9OS/pipes/*.py|lib/*.py|t9_seed.py"
        severity: pause
        checklist:
          - "Have you read the existing code?"
          - "Will you verify behavior after change?"

  CONSTITUTION_CHANGE:
    description: "Constitution / core document modification"
    conditions:
      l1_l2_direct:
        trigger: "Edit|Write && path matches T9OS/constitution/L1_*|L2_*"
        severity: block
        checklist:
          - "Verify explicit designer approval text exists"
          - "Three-location update list: L1/L2 + CLAUDE.md + memory"
          - "Do numbers and state descriptions match current reality?"
      bible_claude:
        trigger: "Edit|Write && path matches T9OS/BIBLE.md|CLAUDE.md"
        severity: pause
        checklist:
          - "Quantitative claim verification (find/wc -l sanity check)"

  INFRA_CHANGE:
    description: "Hook / config changes"
    conditions:
      hooks:
        trigger: "Edit|Write && path matches .claude/hooks/*"
        severity: pause
        checklist:
          - "Does this affect other sessions?"
          - "Consider session start/end hook timeouts"
      settings:
        trigger: "Edit|Write && path matches .claude/settings.json"
        severity: pause
        checklist:
          - "Is hook chain order correct? (hard gate → Orient → rest)"

  DEPLOY:
    description: "Deployment-related operations"
    conditions:
      systemd:
        trigger: "Bash && command matches systemctl"
        severity: pause
        checklist:
          - "Check current state of target (is-active)"
          - "Run smoke test after deployment"
      git_push:
        trigger: "Bash && command matches git push"
        severity: pause
        checklist:
          - "Smoke test 37/37 confirmed?"
          - "No sensitive data in commit?"

  DATA_CHANGE:
    description: "Direct DB / data manipulation"
    conditions:
      sql_like_metadata:
        trigger: "SQL query contains LIKE on metadata column"
        severity: pause
        checklist:
          - "Can you use a proper column instead? (avoid LIKE '%keyword%')"
          - "Full-scan principle: verify result count"

# Guardian integration
# G3 (Rule Guardian) references this file to detect SRBB violations post-hoc.
guardian_integration:
  G3:
    reads: ["BUILD.conditions.new_file_in_pipes"]
    action: "Escalate on SRBB violation"
  G4:
    reads: ["CONSTITUTION_CHANGE.conditions.bible_claude"]
    action: "Auto-run quantitative claim verification"
